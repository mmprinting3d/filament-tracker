<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your 3D printer filament spools with this mobile-friendly web app powered by Firebase">
    <title>Filament Tracker - 3D Printing Inventory Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="app-title">🎨 Filament Tracker</h1>
            <div class="header-actions">
                <button id="themeToggle" class="btn-icon" aria-label="Toggle dark mode">🌙</button>
                <button id="refreshBtn" class="btn-icon" aria-label="Refresh data">🔄</button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="app-container">

        <div id="viewContainer" class="view-container">

            <!-- DASHBOARD -->
            <div id="dashboardView" class="view active">

                <section class="stats-section">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="totalSpools">0</div>
                            <div class="stat-label">Total Spools</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalWeight">0kg</div>
                            <div class="stat-label">Total Weight</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalCost">$0</div>
                            <div class="stat-label">Total Cost</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="lowStockCount">0</div>
                            <div class="stat-label">Low Stock</div>
                        </div>
                    </div>
                </section>

                <section class="search-section">
                    <div class="search-container">
                        <span>🔍</span>
                        <input id="searchInput" placeholder="Search spools..." />
                    </div>

                    <div class="filter-chips">
                        <button class="filter-chip active" data-material="all">All</button>
                        <button class="filter-chip" data-material="PLA">PLA</button>
                        <button class="filter-chip" data-material="PETG">PETG</button>
                        <button class="filter-chip" data-material="ABS">ABS</button>
                        <button class="filter-chip" data-material="TPU">TPU</button>
                        <button class="filter-chip" data-material="Other">Other</button>
                    </div>
                </section>

                <section class="action-section">
                    <button id="addSpoolBtn" class="btn btn-primary btn-large">
                        + Add New Spool
                    </button>
                </section>

                <section class="spools-section">
                    <div id="spoolsGrid" class="spools-grid"></div>

                    <div id="emptyState" class="empty-state" style="display:none;">
                        <div class="empty-icon">📭</div>
                        <h2>No Spools Found</h2>
                        <p>Add your first filament spool!</p>
                        <button id="emptyAddBtn" class="btn btn-primary">Add First Spool</button>
                    </div>
                </section>

            </div>

            <!-- DETAIL VIEW -->
            <div id="detailView" class="view hidden">
                <button id="backFromDetail" class="btn-back">← Back</button>
                <div id="spoolDetail"></div>
            </div>

            <!-- FORM VIEW -->
            <div id="formView" class="view hidden">
                <button id="backFromForm" class="btn-back">← Back</button>

                <div class="form-container">
                    <h2 id="formTitle">Add New Spool</h2>

                    <form id="spoolForm">

                        <fieldset>
                            <legend>Basic Info</legend>

                            <input id="spoolBrand" placeholder="Brand" required>

                            <select id="spoolMaterial" required>
                                <option value="">Material</option>
                                <option>PLA</option>
                                <option>PETG</option>
                                <option>ABS</option>
                                <option>TPU</option>
                                <option>Other</option>
                            </select>

                            <input id="spoolColor" placeholder="Color" required>
                        </fieldset>

                        <fieldset>
                            <legend>Weight</legend>

                            <input type="number" id="spoolOriginalWeight" placeholder="Original g" required>
                            <input type="number" id="spoolRemainingWeight" placeholder="Remaining g" required>
                        </fieldset>

                        <fieldset>
                            <legend>Purchase</legend>

                            <input type="date" id="spoolPurchaseDate">
                            <input type="number" id="spoolCost" placeholder="Cost">
                        </fieldset>

                        <fieldset>
                            <legend>Notes</legend>
                            <textarea id="spoolNotes"></textarea>
                        </fieldset>

                        <button type="submit" class="btn btn-primary btn-large">Save</button>
                        <button type="button" id="formCancelBtn" class="btn btn-secondary">Cancel</button>

                        <input type="hidden" id="spoolEditId">
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- UI -->
    <div id="loadingIndicator" style="display:none;">Loading...</div>
    <div id="toast"></div>

    <!-- FIREBASE (FIXED) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
